{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}

<div class="overlay" style="
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2');
background-size:cover;
background-position:center;
">

<div style="text-align:center;padding-top:150px;">

<h1 style="
font-size:70px;
background:linear-gradient(90deg,#ff0000,#ff8c00);
-webkit-background-clip:text;
color:transparent;
">
F1 Grand Prix Tickets
</h1>

<p style="font-size:22px;margin:20px 0;">
Speed • Precision • Luxury
</p>

<button class="btn" onclick="window.location.href='/events'">
Explore Events
</button>

</div>

</div>

<script>
document.querySelectorAll("a").forEach(link=>{
link.addEventListener("click",()=>{
document.body.style.opacity="0.5";
});
});
</script>

{% endblock %}
