<!DOCTYPE html>
<html>
<head>
<title>F1 Ticket Booking</title>

<style>

body{
margin:0;
font-family:Arial;
background:url('https://images.unsplash.com/photo-1541446654331-8f36b20f6c35') no-repeat center center/cover;
color:white;
}

.navbar{
display:flex;
justify-content:space-between;
background:#000;
padding:15px 40px;
}

.logo{
font-size:24px;
font-weight:bold;
color:red;
}

.menu a{
color:white;
margin-left:20px;
text-decoration:none;
}

.hero{
text-align:center;
padding:120px 20px;
background:rgba(0,0,0,0.6);
}

.hero h1{
font-size:50px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
}

.section{
padding:40px;
background:#111;
}

.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:#1e1e1e;
border-radius:10px;
overflow:hidden;
width:250px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:15px;
text-align:center;
}

.btn{
background:red;
border:none;
padding:10px 15px;
color:white;
cursor:pointer;
margin-top:10px;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">F1Tickets</div>
<div class="menu">
<a href="#">Home</a>
<a href="#">Events</a>
<a href="#">Tracks</a>
<a href="#">Contact</a>
</div>
</div>

<div class="hero">
<h1>Formula 1 Grand Prix Tickets</h1>
<p>Book tickets for the fastest racing event on earth</p>
</div>

<div class="section">
<h2 style="text-align:center;">Upcoming Grand Prix</h2>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1502877338535-766e1452684a">
<div class="card-content">
<h3>Monaco GP</h3>
<p>Premium Experience</p>
<button class="btn">Book Now</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c">
<div class="card-content">
<h3>Silverstone GP</h3>
<p>Classic British Race</p>
<button class="btn">Book Now</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1533473359331-0135ef1b58bf">
<div class="card-content">
<h3>Singapore Night GP</h3>
<p>Night Street Circuit</p>
<button class="btn">Book Now</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c">
<div class="card-content">
<h3>Abu Dhabi GP</h3>
<p>Final Championship Race</p>
<button class="btn">Book Now</button>
</div>
</div>

</div>
</div>

</body>
</html>
