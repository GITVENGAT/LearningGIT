{% extends "base.html" %}

{% block title %}Checkout{% endblock %}

{% block content %}

<div class="overlay" style="
background:
linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.8)),
url('https://images.unsplash.com/photo-1511919884226-fd3cad34687c');
background-size:cover;
background-position:center;
">

<h1 style="text-align:center;padding-top:100px;">
India Delivery Checkout
</h1>

<div class="login-box" style="width:500px;margin:auto;padding:30px;">
<input id="pincode" placeholder="Enter 6-digit Indian Pincode" oninput="validatePincode()">
<input id="address" placeholder="Delivery Address" disabled>
<input id="phone" placeholder="Phone Number" disabled>
<input id="alt_phone" placeholder="Alternate Number" disabled>
<input id="email" placeholder="Email ID" disabled>

<button class="btn" id="orderBtn" onclick="goPayment()" disabled>
Continue to Payment
</button>

<div id="tracking" style="margin-top:20px;"></div>
</div>

</div>

<script>
function validatePincode(){
    let pin = document.getElementById("pincode").value;
    let valid = /^\d{6}$/.test(pin);

    document.getElementById("address").disabled = !valid;
    document.getElementById("phone").disabled = !valid;
    document.getElementById("alt_phone").disabled = !valid;
    document.getElementById("email").disabled = !valid;
    document.getElementById("orderBtn").disabled = !valid;
}

function goPayment(){
    localStorage.setItem("pincode", document.getElementById("pincode").value);
    localStorage.setItem("address", document.getElementById("address").value);
    localStorage.setItem("phone", document.getElementById("phone").value);
    localStorage.setItem("alt_phone", document.getElementById("alt_phone").value);
    localStorage.setItem("email", document.getElementById("email").value);

    window.location.href="/payment";
}

async function placeOrder(){
    let payload = {
        pincode: document.getElementById("pincode").value,
        address: document.getElementById("address").value,
        phone: document.getElementById("phone").value,
        alt_phone: document.getElementById("alt_phone").value,
        email: document.getElementById("email").value
    };

    let res = await fetch("/place-order",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
    });

    let data = await res.json();

    document.getElementById("tracking").innerHTML = `
        <h3>${data.tracking_id || data.msg}</h3>
        <p>${data.status || ""}</p>
    `;
}
</script>

{% endblock %}
