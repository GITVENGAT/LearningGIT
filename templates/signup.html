{% extends "base.html" %}

{% block title %}Signup{% endblock %}

{% block content %}

<div class="overlay" style="
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1511919884226-fd3cad34687c');
background-size:cover;
background-position:center;
">

<div style="display:flex;justify-content:center;align-items:center;height:100vh;">

<div class="login-box">
<h2 style="text-align:center;">Create Account</h2>

<input id="signupUser" placeholder="Username">
<input id="signupPass" type="password" placeholder="Password">

<button class="btn" onclick="signupUser()">Sign Up</button>
</div>

</div>
</div>

<script>
async function signupUser(){
let username = document.getElementById("signupUser").value;
let password = document.getElementById("signupPass").value;

let res = await fetch("/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
});

let data = await res.json();
alert(data.msg);

if(data.msg === "Signup success"){
window.location.href="/login-page";
}
}
</script>

{% endblock %}
