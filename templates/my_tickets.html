{% extends "base.html" %}

{% block title %}My Tickets{% endblock %}

{% block content %}

<div class="overlay" style="
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1521412644187-c49fa049e84d');
background-size:cover;
background-position:center;
">

<h1 style="text-align:center;padding-top:100px;">
My Booked Tickets
</h1>

<div class="grid">

{% if tickets %}

{% for t in tickets %}
<div class="card">
<h3>{{ t[0] }}</h3>
<p>Confirmed Booking</p>
</div>
{% endfor %}

{% else %}

<h2 style="text-align:center;">No tickets booked yet</h2>

{% endif %}

</div>

</div>

{% endblock %}
