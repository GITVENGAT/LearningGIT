{% extends "base.html" %}

{% block title %}{{ category }}{% endblock %}

{% block content %}

<div class="overlay" style="
    background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('{{ url_for('static', filename='images/category-bg.jpg') }}');
    background-size:cover;
    background-position:center;
    min-height:100vh;
    padding-top:100px;
    color:white;
">

<h1 style="text-align:center; margin-bottom:40px;">
    {{ category }}
</h1>

{% if items %}
<div class="grid">
    {% for item in items %}
    <div class="card" style="text-align:center;">
        <img src="{{ item[5] }}" style="
            width:100%;
            height:220px;
            object-fit:cover;
            border-radius:12px;
        ">
        <h3 style="margin-top:15px;">{{ item[3] }}</h3>
        <p>₹{{ item[4] }}</p>
        <button class="btn" onclick="addToCart({{ item[0] }})">
            🛍 Add to Cart
        </button>
    </div>
    {% endfor %}
</div>
{% else %}
<h2 style="text-align:center; color:#ff5555; margin-top:50px;">
    No products available in this category
</h2>
{% endif %}

</div>

<script>
async function addToCart(product_id){
    let res = await fetch("/add-to-cart", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({product_id})
    });

    let data = await res.json();

    if(data.msg === "Login required"){
        alert("Please login first");
        window.location.href="/login-page";
    } else {
        if(confirm("Item added successfully. Go to cart?")){
            window.location.href="/cart";
        }
    }
}
</script>

{% endblock %}
