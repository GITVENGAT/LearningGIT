<!-- ========================= notifications.html ========================= -->
{% extends "base.html" %}
{% block title %}Notifications{% endblock %}

{% block content %}
<div class="overlay" style="
background:
linear-gradient(rgba(0,0,0,0.88),rgba(0,0,0,0.88)),
url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3');
background-size:cover;
background-position:center;
min-height:100vh;
padding:80px 60px;
">

<h1 style="
text-align:center;
margin-bottom:50px;
font-size:42px;
font-weight:700;
letter-spacing:1px;
">
    📧 Notification Center
</h1>

{% if messages %}
<div class="grid" style="
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
padding:0 20px;
">
    {% for note in messages %}
    <div class="glass-card" style="
        padding:22px;
        background:rgba(0,0,0,0.45);
        backdrop-filter:blur(12px);
        border:1px solid rgba(255,255,255,0.12);
        border-radius:16px;
        box-shadow:0 8px 25px rgba(0,0,0,0.25);
        color:white;
        transition: transform 0.2s, box-shadow 0.2s;
    " onmouseover="this.style.transform='scale(1.03)'; this.style.boxShadow='0 12px 25px rgba(0,255,120,0.25)'" 
       onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 8px 25px rgba(0,0,0,0.25)'">
        <h3 style="
        margin:0;
        font-size:20px;
        font-weight:600;
        line-height:1.5;
        ">
            {{ note[0] }}
        </h3>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="glass-card" style="
    padding:25px;
    text-align:center;
    max-width:600px;
    margin:50px auto;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:16px;
    box-shadow:0 8px 25px rgba(0,0,0,0.25);
    color:#ff8888;
">
    <h3 style="margin:0;font-size:22px;">No notifications yet 📭</h3>
</div>
{% endif %}

</div>

<style>
.glass-card {
    transition: all 0.3s ease;
}
.glass-card:hover {
    cursor: pointer;
}
</style>

{% endblock %}
